<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Agent</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/app.js"></script>
</head>

<body>
    <div id="sidebar">
        <h2>Documents</h2>
        <p style="font-size: 12px; color: #64748b;">Upload a PDF to configure your document context.</p>

        <div class="upload-control-panel">
            <input type="file" id="batch-pdf-uploader" accept=".pdf" multiple />
            <button onclick="triggerBatchUploadSequence()">Upload Documents</button>
        </div>

        <div id="runtimeStatus" class="status-txt">System standby: no active index.</div>

        <div class="docs-header">
            <h3>Documents</h3>
        </div>
        <div id="documentsList" class="docs-container"
            style="max-height: 150px; overflow-y: auto; margin-bottom: 15px;"></div>

        <hr class="divider">

        <div class="sessions-header">
            <h3>💬 Chat Sessions</h3>
            <button class="new-chat-btn" onclick="createNewSession()">+ New</button>
        </div>

        <div id="sessionsList" class="sessions-container"></div>
    </div>

    <div id="chat-canvas">
        <div id="messages-viewport">
            <div class="chat-bubble ai-align">Hello! Upload a PDF to get started.</div>
        </div>
        <div id="input-dock">
            <input type="text" id="queryConsole" placeholder="Ask something about your document..." disabled
                onkeydown="if(event.key === 'Enter') handleQuerySubmission()">
            <button id="submitBtn" onclick="handleQuerySubmission()" disabled>Send</button>
        </div>
    </div>
</body>

</html>
