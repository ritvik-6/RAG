<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Agent</title>
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/app.js"></script>
</head>
<body>
    <div id="sidebar">
        <h2>📄 Document Console</h2>
        <p style="font-size: 12px; color: #64748b;">Upload a PDF to configure your document context.</p>

        <div class="panel-card">
            <input type="file" id="pdfFileInput" accept=".pdf">
            <button id="uploadBtn" onclick="processPDF()" style="width: 100%;">Ingest File</button>
        </div>

        <div id="runtimeStatus" class="status-txt">System standby: no active index.</div>

        <hr class="divider">

        <div class="sessions-header">
            <h3>💬 Chat Sessions</h3>
            <button class="new-chat-btn" onclick="createNewSession()">+ New</button>
        </div>

        <div id="sessionsList" class="sessions-container"></div>
    </div>

    <div id="chat-canvas">
        <div id="messages-viewport">
            <div class="chat-bubble ai-align">Hello! Upload a PDF to get started.</div>
        </div>
        <div id="input-dock">
            <input
                type="text"
                id="queryConsole"
                placeholder="Ask something about your document..."
                disabled
                onkeydown="if(event.key === 'Enter') handleQuerySubmission()"
            >
            <button id="submitBtn" onclick="handleQuerySubmission()" disabled>Send</button>
        </div>
    </div>
</body>
</html>
