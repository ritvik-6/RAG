services:
  db:
    image: postgres:16-alpine
    container_name: my-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro

  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - etcddata:/etcd
    command: etcd -advertise-client-urls=http://etcd:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: minio server /data

  milvus:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.4.0
    restart: always
    command: ["milvus", "run", "standalone"]
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - milvusdata:/var/lib/milvus
    depends_on:
      - etcd
      - minio

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend_runtime
    container_name: fastapi-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://postgres:Admin@db:5432/postgres
      - MILVUS_URI=http://milvus:19530
    volumes:
      - ./backend:/app/backend
      - hf_cache:/root/.cache/huggingface
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload --no-access-log
    depends_on:
      - milvus
      - db

#frontend is running on port 3000 using npm run dev.For production build, you can uncomment the frontend service below and run npm run build to build the frontend and serve it using nginx.
