services:
  db:
    image: postgres:16-alpine
    container_name: my-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Admin
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Automatically initializes your tables using your existing schema script
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql:ro

  backend:
    build: .
    container_name: fastapi-backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Directs the backend to connect internally to the 'db' container
      - DATABASE_URL=postgresql://postgres:Admin@db:5432/postgres
    volumes:
      - ./backend:/app/backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

volumes:
  pgdata:
    driver: local